services:

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0000}
      POSTGRES_DB: ${POSTGRES_DB:-gitlab_kpi1}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gitlab_kpi1}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./dataCollection/src/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.docker
    ports:
      - "8001:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - ./dataCollection/src/backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./dataCollection/src/frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5174:5173"
    volumes:
      - ./dataCollection/src/frontend/src:/app/src
    depends_on:
      - backend
    environment:
      - VITE_API_TARGET=http://backend:8000
      - VITE_API_URL=http://localhost:8001/api/v1


volumes:
  postgres_data: