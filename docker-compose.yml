services:

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: kpi_user
      POSTGRES_PASSWORD: kpi_pass
      POSTGRES_DB: kpi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpi_user -d kpi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./dataCollection/src/backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "GitLab KPI Dashboard API"
      APP_VERSION: "3.0.0"
      DEBUG: "False"
      POSTGRES_USER: kpi_user
      POSTGRES_PASSWORD: kpi_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: kpi_db
      DATABASE_URL: "postgresql://kpi_user:kpi_pass@db:5432/kpi_db"
      SECRET_KEY: "SUPER_LONG_RANDOM_SECRET"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ENCRYPTION_KEY: "Kjmdv6TEIBxn2C81WqXPkYYU5UIx_9lWK6OIW8e4MvU="
      GITLAB_BASE_URL: "https://gitlab.com/api/v4"
      ALLOWED_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      SCHEDULER_ENABLED: "False"
      ADMIN_EMAIL: "admin@test.com"
      ADMIN_PASSWORD: "Admin1234!"
      DUMP_DIR: "dumps"
      LOG_FILE: "logs/app.log"
    volumes:
      - ./dataCollection/src/backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./dataCollection/src/frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./dataCollection/src/frontend/src:/app/src
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8000
      VITE_API_URL: http://localhost:8000/api/v1

volumes:
  postgres_data: