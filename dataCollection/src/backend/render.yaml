services:
  - type: web
    name: gitlab-kpi-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gitlab-kpi-db
          property: connectionString
      - key: USE_SCHEMAS
        value: "true"
      - key: POSTGRES_HOST
        fromDatabase:
          name: gitlab-kpi-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: gitlab-kpi-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: gitlab-kpi-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: gitlab-kpi-db
          property: password
      - key: POSTGRES_DB
        value: postgres
      - key: GITLAB_TOKEN
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEBUG
        value: "false"
      - key: SCHEDULER_ENABLED
        value: "false"

databases:
  - name: gitlab-kpi-db
    databaseName: postgres
    user: postgres
