version: '3.8'

services:
  db:
    image: postgres:15
    container_name: kpi_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0000}
      POSTGRES_DB: ${POSTGRES_DB:-gitlab_kpi1}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: kpi_backend
    restart: always
    depends_on:
      - db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-0000}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-gitlab_kpi1}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@test.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin1234!}
      - SECRET_KEY=${SECRET_KEY:-SUPER_LONG_RANDOM_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-Kjmdv6TEIBxn2C81WqXPkYYU5UIx_9lWK6OIW8e4MvU=}
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend/logs:/app/logs
      - ./src/backend/dumps:/app/dumps

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: kpi_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000

volumes:
  postgres_data:
